    /* ===GENERATED:BEGIN=== */ … /* ===GENERATED:END=== */ markers below is written by

    SHORTS_*.md packs' END-REVEAL lines. To re-populate: run the generator (see §6 of the brief).
    Canonical record also written to Website/Assets/shorts_cards.json.
  Built to: Website/WORKSHOP_BRIEF_SHORTS_CARD_GENERATOR_2026-06-18.md.
  Visual authority: Website/DESIGN_BRIEF.md (clean consumer-fintech §1, components §2, constraints §6).

    gold accent (--gold/--goldtx), the true-minus rule. NOT the "Quiet Authority" look.

    Band/colour are DERIVED in this file from net/tok — a stored band can never contradict the score.

  NOTE for QB: neutral band is rendered with --zero (the locked VF/scoreboard primitive) so the card matches
    SCOREBOARD_BOARD_16x9.html exactly. The brief calls this the "yellow / neutral" zone; --zero IS that
    neutral-zone colour in the locked system (NOT amber, NOT dark-navy). Flagged, not bent.
-->

<script>
/* =====================================================================================
   CATALYST DATA — GENERATED, DO NOT EDIT BY HAND.
   Lifted verbatim from the YouTube SHORTS_*.md END-REVEAL lines by build_shorts_card.py.
   Per-catalyst order is locked Network · Token. Band/colour are DERIVED below, never stored.
   Stable order: token → source video → covered-row order as it appears in the pack.
   ===================================================================================== */
  /* ===GENERATED:BEGIN=== */
const CATALYSTS = [
  { headline:"Goldman dumps its entire $153.8M XRP stake", net:5.0, tok:2.0, takeaway:"Wall Street's biggest XRP buyer is gone — a verdict on the coin, not the tech.",
    source:"Video 1 (public deep-dive)", video_num:1, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
  { headline:"May 6 JPMorgan / Mastercard / Ondo pilot on XRPL", net:8.0, tok:5.0, takeaway:"Banks used the ledger. The coin earned a fraction of a cent.",
    source:"Video 1 (public deep-dive)", video_num:1, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
  { headline:"RLUSD growth (~$1.67B · now ~1.8× the XRP ETF market)", net:7.0, tok:3.0, takeaway:"The decoupling made visible — the substitute outgrew the coin's own demand sink.",
    source:"Video 1 (public deep-dive)", video_num:1, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
  { headline:"Ripple escrow net leak (~300M XRP/mo)", net:5.0, tok:3.5, takeaway:"More supply arriving than buyers absorb — a slow, telegraphed drag.",
    source:"Video 1 (public deep-dive)", video_num:1, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
  { headline:"XRPL crosses $3B+ tokenized RWA (+124% Q1)", net:7.0, tok:5.0, takeaway:"The biggest number on the board. Almost none of it reaches the coin.",
    source:"Video 2 (public follow-up)", video_num:2, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
  { headline:"XRPL institutional DeFi stack (XLS-81/65/66 · EVM sidechain)", net:7.0, tok:5.8, takeaway:"The one mechanism that could re-couple the coin — built, live, and empty. A bull on option value.",
    source:"Video 2 (public follow-up)", video_num:2, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
  { headline:"Evernorth XRPN treasury (~473M held · $233.7M impairment)", net:5.0, tok:5.6, takeaway:"473M locked looks huge — but it scores only a weak bull. Lockup is not buy pressure.",
    source:"Video 2 (public follow-up)", video_num:2, lead_id:"20260610-xrp_ledger-e91604c8", token:"XRP" },
];
  /* ===GENERATED:END=== */

/* ===== Bands — SCORING_SYSTEM_V2 §1: Bearish 1.0–4.4 / Neutral 4.5–5.5 / Bullish 5.6–10.0 ===== */
const BNB=4.45, BNL=5.55;
const bandKey  = s => s>=BNL ? "bull" : (s>=BNB ? "neu" : "bear");
const bandWord = s => s>=BNL ? "BULLISH" : (s>=BNB ? "NEUTRAL" : "BEARISH");
const colVar   = s => bandKey(s)==='bull' ? 'var(--green)' : bandKey(s)==='bear' ? 'var(--red)' : 'var(--zero)';
const round1 = x => Math.round(x*10)/10;
/* true-minus (U+2212) — VF §6.3; one decimal */
const fmt1   = x => { const v=round1(x); return (v<0?'−':'')+Math.abs(v).toFixed(1); };

/* ===== Fear&Greed semicircle gauge — same construction as SCOREBOARD_BOARD_16x9.html ===== */
function polar(cx,cy,r,deg){ const a=deg*Math.PI/180; return [cx+r*Math.cos(a), cy-r*Math.sin(a)]; }
const A = s => 180 - (s-1)/9*180;
function arcSeg(cx,cy,r,a0,a1){
  const steps=32, pts=[];
  for(let k=0;k<=steps;k++){ const a=a0+(a1-a0)*k/steps; const p=polar(cx,cy,r,a); pts.push(p[0].toFixed(2)+" "+p[1].toFixed(2)); }
  return "M"+pts.join(" L");
}
function gaugeSVG(score,r,th,numSize){
  const pad=th/2+5, W=Math.round(r*2+th+12), cx=W/2, cy=r+pad, H=Math.round(cy+12);
  const aB=[180,A(BNB)], aN=[A(BNB),A(BNL)], aU=[A(BNL),0];
  let s=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">`;
  s+=`<path d="${arcSeg(cx,cy,r,aB[0],aB[1])}" fill="none" stroke="var(--red)"  stroke-width="${th}" stroke-linecap="round"/>`;
  s+=`<path d="${arcSeg(cx,cy,r,aN[0],aN[1])}" fill="none" stroke="var(--zero)" stroke-width="${th}"/>`;
  s+=`<path d="${arcSeg(cx,cy,r,aU[0],aU[1])}" fill="none" stroke="var(--green)" stroke-width="${th}" stroke-linecap="round"/>`;
  const col=colVar(score);
  const bp=polar(cx,cy,r,A(score));
  s+=`<circle cx="${bp[0].toFixed(2)}" cy="${bp[1].toFixed(2)}" r="${(th/2+4).toFixed(1)}" fill="${col}" stroke="var(--card)" stroke-width="4"/>`;
  s+=`<text x="${cx}" y="${(cy-4).toFixed(1)}" text-anchor="middle" font-family="var(--mono)" font-weight="700" font-size="${numSize}" fill="${col}">${fmt1(score)}</text>`;
  return s+`</svg>`;
}

let idx=0, ratio='916';

function gaugeGeom(){ return ratio==='916' ? {r:188,th:30,num:122} : {r:132,th:22,num:88}; }

function render(){
  const c=CATALYSTS[idx], g=gaugeGeom();
  document.getElementById("headline").textContent = c.headline;
  /* takeaway lifted verbatim from the END-REVEAL line — rendered as plain text (no injected markup) */
  document.getElementById("takeaway").textContent = c.takeaway;
  document.getElementById("netGauge").innerHTML = gaugeSVG(c.net,g.r,g.th,g.num);
  document.getElementById("tokGauge").innerHTML = gaugeSVG(c.tok,g.r,g.th,g.num);
  const nw=document.getElementById("netWord"), tw=document.getElementById("tokWord");
  nw.textContent=bandWord(c.net); nw.className="pword "+bandKey(c.net);
  tw.textContent=bandWord(c.tok); tw.className="pword "+bandKey(c.tok);
  document.getElementById("netLabel").className="plabel "+bandKey(c.net);
  document.getElementById("tokLabel").className="plabel "+bandKey(c.tok);
  [...document.querySelectorAll("#catgroups button")].forEach(b=>b.classList.toggle("on",+b.dataset.i===idx));
}

function setCatalyst(i){ idx=(i+CATALYSTS.length)%CATALYSTS.length; render(); }
function setRatio(r){
  ratio=r;
  document.body.classList.toggle("r916",r==='916');
  document.body.classList.toggle("r11",r==='11');
  document.getElementById("b916").classList.toggle("on",r==='916');
  document.getElementById("b11").classList.toggle("on",r==='11');
  render(); fit();
}

/* ===== Grouped picker — one labelled group per source video (token-ready: token → source). =====
   Buttons are globally numbered 1..N so the 1–N digit keys map directly to button labels. */
function buildPicker(){
  const host=document.getElementById("catgroups");
  host.innerHTML="";
  const tokens=[...new Set(CATALYSTS.map(c=>c.token))];
  const multiToken=tokens.length>1;
  const groups=[]; const seen=new Map();
  CATALYSTS.forEach((c,i)=>{
    const key=c.token+"||"+c.source;
    let g=seen.get(key);
    if(!g){ g={token:c.token,source:c.source,items:[]}; seen.set(key,g); groups.push(g); }
    g.items.push(i);
  });
  groups.forEach(g=>{
    const wrap=document.createElement("div"); wrap.className="cgroup";
    const lab=document.createElement("div"); lab.className="glabel";
    lab.innerHTML=(multiToken?`<span class="gtok">${g.token}</span> · `:"")+g.source;
    wrap.appendChild(lab);
    const row=document.createElement("div"); row.className="gbtns";
    g.items.forEach(i=>{ const b=document.createElement("button"); b.textContent=i+1; b.dataset.i=i;
      b.onclick=()=>setCatalyst(i); row.appendChild(b); });
    wrap.appendChild(row); host.appendChild(wrap);
  });
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){e.preventDefault();setCatalyst(idx+1);}
  if(e.key==="ArrowLeft"){e.preventDefault();setCatalyst(idx-1);}
  if(e.key>="1"&&e.key<="9"){ const n=+e.key-1; if(n<CATALYSTS.length) setCatalyst(n); }
  if(e.key==="a"||e.key==="A")setRatio(ratio==='916'?'11':'916');
  if(e.key==="h"||e.key==="H")document.body.classList.toggle("clean");
});

/* scale the fixed-pixel card to fit the viewport (capture at 100% for true 1080-px pixels) */
function fit(){
  const card=document.getElementById("card");
  const W=ratio==='916'?1080:1080, Hh=ratio==='916'?1920:1080;
  const s=Math.min(innerWidth/W, innerHeight/Hh, 1);
  card.style.transform=`scale(${s})`;
}
addEventListener("resize",fit);

buildPicker(); render(); fit();
</script>
